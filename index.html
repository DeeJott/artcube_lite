<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abyssal Glow - Collaborative Artcube</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

#canvasContainer {
  position: relative; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #000; overflow: hidden;
}
canvas#main { background: #001; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: block; }

#orientationOverlay {
  position: fixed; inset: 0; background: #000; z-index: 100;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
}
#orientationOverlay svg { width: 50px; height: 50px; fill: #fff; margin-bottom: 1.5rem; animation: rotate 2s infinite ease-in-out; }
@keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
@media (orientation: portrait) { #orientationOverlay { display: flex; } }

#startScreen {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10; text-align: center;
  transition: opacity 2s ease-in-out; padding: 1rem;
}
#startScreen h1 { font-size: clamp(1.5rem, 8vw, 4rem); font-weight: 200; letter-spacing: .3em; margin-bottom: .6rem; }
#startScreen p  { font-size: clamp(0.6rem, 2.5vw, 0.85rem); color: rgba(255,255,255,.4); letter-spacing: .12em; margin-bottom: 1.5rem; font-weight: 300; }

#setupUI { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 0.8rem; }
input#userName {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 0.8rem; font-size: 0.9rem; letter-spacing: 0.1em;
  text-align: center; outline: none; border-radius: 0; width: 100%;
}
#joinBtn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
  color: #fff; padding: 0.8rem; cursor: pointer; letter-spacing: 0.1em; 
  font-family: inherit; font-size: 0.75rem; border-radius: 0; width: 100%;
}

#shareLinkArea {
  margin-top: 1rem; padding: 0.8rem; background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.1); display: none; width: 100%;
}
#sessionLink { font-size: 0.65rem; color: #00f2ff; word-break: break-all; cursor: pointer; text-decoration: underline; background: transparent; border: none; font-family: inherit; width: 100%; }

#startBtn {
  background: transparent; border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.8); padding: .75rem 2.5rem;
  font-size: .8rem; letter-spacing: .2em; cursor: pointer; transition: all .4s; font-family: inherit;
  margin-top: 1.5rem; display: none;
}

#onlineStatus {
  position: absolute; bottom: 2rem; left: 2rem;
  display: flex; flex-direction: column; gap: 0.6rem;
  text-align: left; pointer-events: none; z-index: 11;
}
.user-row { display: flex; align-items: center; gap: 0.6rem; opacity: 0; transition: opacity 0.5s; }
.user-row.visible { opacity: 1; }
.status-dot { width: 6px; height: 6px; background: #00ff9f; border-radius: 50%; box-shadow: 0 0 8px #00ff9f; transition: background 0.3s; }
.status-dot.offline { background: #ff4b4b; box-shadow: 0 0 8px #ff4b4b; }
.user-name { font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); text-transform: uppercase; }

#sessionUI { position: fixed; top: 1.5rem; left: 0; right: 0; text-align: center; z-index: 10; display: none; pointer-events: none; }
#pauseBtn { background: transparent; border: 1px solid rgba(255,255,255,.22); color: rgba(255,255,255,.45); padding: .2rem .9rem; font-size: .65rem; letter-spacing: .18em; cursor: pointer; font-family: inherit; transition: all .3s; vertical-align: middle; margin-left: .8rem; pointer-events: all; }
#timer  { font-size: .7rem; letter-spacing: .25em; color: rgba(255,255,255,.3); margin-bottom: .4rem; }
#status { font-size: .8rem; letter-spacing: .08em; color: rgba(255,255,255,.45); font-weight: 300; }
#souvenirUI { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5; pointer-events: none; font-size: 1.5rem; letter-spacing: 0.2em; color: #fff; text-transform: uppercase; }
#captureFrame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.8); display: none; z-index: 4; box-shadow: 0 0 0 5000px rgba(0,0,0,0.4); }

#finalScreen {
  position: fixed; inset: 0; background: rgba(0,0,0,0.96);
  display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
}
#uploadMsg { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 2rem; letter-spacing: 0.2em; text-transform: uppercase; }
#mintBtn {
  display: none;
  background: transparent; border: 1px solid #00f2ff;
  color: #00f2ff; padding: 1.2rem 2.5rem;
  font-size: 0.9rem; letter-spacing: 0.2em; cursor: pointer;
  text-decoration: none; transition: all 0.4s;
  box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
}
#mintBtn:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }

input[type="file"] { display: none; }
</style>
</head>
<body>

<div id="orientationOverlay">
  <svg viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
  <p>Bitte drehe dein Gerät ins Querformat.</p>
</div>

<div id="canvasContainer">
  <canvas id="main"></canvas>
  <div id="captureFrame"></div>
</div>

<input type="file" id="audioInput" accept="audio/*">

<div id="startScreen">
  <h1>abyssal<span style="opacity:.28">.</span>glow</h1>
  <p id="subline">wähle musik &middot; gestalte deine tiefe &middot; minte dein nft</p>
  
  <div id="setupUI">
    <div class="input-group">
      <input type="text" id="userName" placeholder="DEIN NAME" maxlength="15">
      <button id="joinBtn">BEITRETEN</button>
    </div>
    
    <div id="shareLinkArea">
      <small>Lade jemanden ein:</small>
      <button id="sessionLink">Link kopieren</button>
    </div>
  </div>

  <button id="startBtn">START</button>

  <div id="onlineStatus">
    <div id="user1" class="user-row">
      <div class="status-dot" id="dot1"></div>
      <div class="user-name"><span id="name1">Host</span> <span id="statText1">offline</span></div>
    </div>
    <div id="user2" class="user-row">
      <div class="status-dot" id="dot2"></div>
      <div class="user-name"><span id="name2">Gast</span> <span id="statText2">offline</span></div>
    </div>
  </div>
</div>

<div id="sessionUI">
  <div id="timer"><span id="timerText">00:00</span> <button id="pauseBtn">PAUSE</button></div>
  <div id="status">initialisierung...</div>
</div>

<div id="souvenirUI">Erstelle dein Souvenir in <span id="countdown">5</span></div>

<div id="finalScreen">
  <div id="uploadMsg">verbinde zur blockchain...</div>
  <a id="mintBtn" target="_blank">SOUVENIR JETZT EINSAMMELN</a>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// --- SESSION LOGIC ---
const urlParams = new URLSearchParams(window.location.search);
let sessionId = urlParams.get('sid') || 'art-' + Math.random().toString(36).substring(2, 8);
let isHost = !urlParams.get('sid');
let myName = localStorage.getItem('artcube_name') || "";
let peer = null, conn = null;

const SessionManager = {
  host: { name: "Host", status: "offline" },
  guest: { name: "Gast", status: "offline" },
  joined: false,
  init() {
    if (myName) document.getElementById('userName').value = myName;
    const linkBtn = document.getElementById('sessionLink');
    const currentUrl = window.location.origin + window.location.pathname;
    const fullLink = currentUrl + '?sid=' + sessionId;
    linkBtn.textContent = fullLink;
    linkBtn.onclick = () => {
      navigator.clipboard.writeText(fullLink);
      linkBtn.textContent = "KOPIERT!";
      setTimeout(() => { linkBtn.textContent = fullLink; }, 2000);
    };
    document.getElementById('joinBtn').onclick = () => this.join();
    const peerId = isHost ? sessionId : null;
    peer = new Peer(peerId, { debug: 1, config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
    peer.on('open', id => { if (!isHost) this.connectToHost(); });
    peer.on('connection', c => { conn = c; this.setupConnection(); });
  },
  connectToHost() {
    conn = peer.connect(sessionId, { reliable: true });
    this.setupConnection();
    setTimeout(() => { if (!conn || !conn.open) this.connectToHost(); }, 5000);
  },
  setupConnection() {
    conn.on('open', () => { if (this.joined) this.sendStatus('online'); });
    conn.on('data', data => {
      if (data.type === 'STATUS') {
        this.updateUser(data.name, data.status, data.role);
        if (data.status === 'online' && this.joined) this.sendStatus('online');
      }
      if (data.type === 'START_EXPERIENCE') startExperience(true);
      if (data.type === 'INTERACTION') {
        const lx = data.rx * W, ly = data.ry * H;
        if (data.kind === 'FISH_SCHOOL') createFishSchool(lx, ly, data.dir, false, data.fishArray);
        if (data.kind === 'JELLYFISH') createJellyfish(lx, ly, false, data.colorIdx, data.vx, data.vy);
        if (data.kind === 'WHALE') createWhale(false, data.ry, data.speed);
      }
    });
    conn.on('close', () => this.handleDisconnect());
  },
  handleDisconnect() {
    if (isHost) this.updateUser(this.guest.name, 'offline', 'guest');
    else this.updateUser(this.host.name, 'offline', 'host');
  },
  sendStatus(status) { 
    if (conn && conn.open && myName) conn.send({ type: 'STATUS', name: myName, status, role: isHost ? 'host' : 'guest' });
  },
  sendInteraction(kind, data) { 
    if (conn && conn.open) conn.send({ type: 'INTERACTION', kind, rx: data.x / W, ry: data.y / H, ...data });
  },
  join() {
    myName = document.getElementById('userName').value.trim();
    if (!myName) return;
    localStorage.setItem('artcube_name', myName);
    this.joined = true;
    this.updateUser(myName, 'online', isHost ? 'host' : 'guest');
    this.sendStatus('online');
    document.getElementById('userName').disabled = true;
    document.getElementById('joinBtn').style.display = 'none';
    if (isHost) {
      document.getElementById('shareLinkArea').style.display = 'block';
      document.getElementById('startBtn').style.display = 'block';
    } else {
      document.getElementById('subline').innerHTML = "Warte auf den Host...";
    }
  },
  updateUser(name, status, role) {
    if (role === 'host') this.host = { name, status };
    else if (role === 'guest') this.guest = { name, status };
    this.updateUI();
  },
  updateUI() {
    document.getElementById('name1').textContent = this.host.name;
    document.getElementById('statText1').textContent = this.host.status;
    document.getElementById('dot1').className = 'status-dot ' + (this.host.status === 'offline' ? 'offline' : '');
    document.getElementById('user1').classList.add('visible');
    document.getElementById('name2').textContent = this.guest.name;
    document.getElementById('statText2').textContent = this.guest.status;
    document.getElementById('dot2').className = 'status-dot ' + (this.guest.status === 'offline' ? 'offline' : '');
    document.getElementById('user2').classList.add('visible');
  }
};
SessionManager.init();

// --- ANIMATION ---
const mainCanvas = document.getElementById('main'), ctx = mainCanvas.getContext('2d');
const offscreenCanvas = document.createElement('canvas'), offscreenCtx = offscreenCanvas.getContext('2d');
let W = 1920, H = 1080, running = false, paused = false, canInteract = true, isRecordingPhase = false, finalTriggered = false;
let elapsed = 0, lastFrameTime = 0, isMouseDown = false, lastSwipeX = 0, lastSwipeDir = 0, swipeCount = 0, gesturePath = [];
let recorder = null, chunks = [];
let jellyfishPending = false, whalePending = false, lastTouchPos = {x:0, y:0};

const MINT_BASE_URL = 'https://art-box-beta.vercel.app/mint?nft=';

function resize() {
  const targetAspect = 16 / 9, windowAspect = window.innerWidth / window.innerHeight;
  let dW, dH;
  if (windowAspect > targetAspect) { dH = window.innerHeight; dW = dH * targetAspect; } 
  else { dW = window.innerWidth; dH = dW / targetAspect; }
  mainCanvas.style.width = dW + 'px'; mainCanvas.style.height = dH + 'px';
  mainCanvas.width = W; mainCanvas.height = H;
  const fH = Math.floor(H * 0.75), fW = Math.floor(fH * 0.75);
  const frame = document.getElementById('captureFrame');
  if (frame) { frame.style.width = (dW * 0.75 * 0.75) + 'px'; frame.style.height = (dW * 0.75) + 'px'; }
  offscreenCanvas.width = fW; offscreenCanvas.height = fH;
}
window.addEventListener('resize', resize); resize();

function getVirtualCoords(clientX, clientY) {
  const rect = mainCanvas.getBoundingClientRect();
  return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
}

const FISH = [], FISH_COLORS = ['#00f2ff', '#00ff9f', '#ff00e5', '#bd00ff', '#f0ff00', '#ff3300', '#0077ff', '#00ffcc', '#ffcc00', '#ffffff', '#ff99cc'];
function createFish(x, y, vx, vy, isLocal = true, colorIdx) {
  FISH.push({ x, y, vx, vy, size: 6+Math.random()*8, color: FISH_COLORS[colorIdx], born: elapsed, flash: 0, isLocal });
}
function createFishSchool(x, y, dir, isLocal = true, fishArray) {
  if (isLocal) {
    const count = (elapsed >= 12) ? 5 + Math.floor(Math.random() * 5) : 1;
    const school = [];
    for (let i = 0; i < count; i++) {
        const f = { ox: (Math.random()-0.5)*80, oy: (Math.random()-0.5)*80, vx: dir*(0.75+Math.random()*0.5), vy: (Math.random()-0.5)*0.15, cIdx: Math.floor(Math.random()*FISH_COLORS.length) };
        school.push(f); createFish(x + f.ox, y + f.oy, f.vx, f.vy, true, f.cIdx);
    }
    SessionManager.sendInteraction('FISH_SCHOOL', { x, y, dir, fishArray: school });
  } else {
    fishArray.forEach(f => createFish(x + f.ox, y + f.oy, f.vx, f.vy, false, f.cIdx));
  }
}
function drawFish(t) {
  const bass = AudioEngine.intensity;
  for (let i = FISH.length - 1; i >= 0; i--) {
    const f = FISH[i];
    if (isRecordingPhase && !f.isLocal) continue;
    f.x += f.vx * (1 + bass * 1.5); f.y += f.vy * (1 + bass * 1.5);
    if (f.flash > 0) f.flash *= 0.90;
    const osc = Math.sin(t * 8 + f.born) * 5, angle = f.vx > 0 ? 0 : Math.PI;
    ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(angle); if (f.vx < 0) ctx.scale(1, -1);
    ctx.beginPath(); ctx.ellipse(0, 0, f.size * 1.5, f.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = f.color; ctx.shadowBlur = 20 + (f.flash * 50); ctx.shadowColor = f.color;
    if (f.flash > 0.1) ctx.fillStyle = '#fff';
    ctx.fill(); ctx.beginPath(); ctx.moveTo(-f.size*1.2, 0); ctx.lineTo(-f.size*2, osc); ctx.lineTo(-f.size*2, -osc); ctx.closePath();
    ctx.fillStyle = f.color; ctx.fill(); ctx.restore();
    if (f.x < -400 || f.x > W + 400 || t - f.born > 25) FISH.splice(i, 1);
  }
}

const SNOW_PARTICLES = Array.from({ length: 500 }, () => ({ x: Math.random(), y: Math.random(), size: 1.0+Math.random()*2.0, speedY: 0.0001+Math.random()*0.0003, driftX: (Math.random()-0.5)*0.0001, alpha: 0.15+Math.random()*0.4, isReactive: Math.random()>0.8, glow: 0 }));
function drawSnow(t) {
  const bass = AudioEngine.intensity;
  SNOW_PARTICLES.forEach(p => {
    p.y += p.speedY * (1 + bass*3); p.x += p.driftX;
    if (p.y > 1.05) { p.y = -0.05; p.x = Math.random(); }
    if (p.isReactive && bass > 0.5) p.glow = Math.max(p.glow, bass*2.5);
    p.glow *= 0.92;
    const px = p.x*W, py = p.y*H;
    ctx.shadowBlur = p.glow*30; ctx.shadowColor = '#00ffff';
    ctx.fillStyle = `rgba(200, 255, 255, ${p.alpha + p.glow})`;
    const s = p.size * (1+p.glow*2); ctx.fillRect(px, py, s, s);
  });
}

const ALGAE = [], CORALS = [];
function initPlants() {
  for(let i=0; i<15; i++) ALGAE.push({ x: Math.random()*W, segments: 12+Math.random()*12, segLen: 8+Math.random()*8, w: 15+Math.random()*15, phase: Math.random()*Math.PI*2, color: `hsl(${130+Math.random()*40}, 40%, 15%)`, alpha: 0 });
  for(let i=0; i<10; i++) CORALS.push({ x: Math.random()*W, size: 30+Math.random()*50, color: `hsl(${Math.random()*360}, 60%, 40%)`, alpha: 0, rot: Math.random()*0.4-0.2 });
}
function drawPlants(t) {
  ALGAE.forEach(a => {
    if (elapsed > 12) a.alpha = Math.min(0.8, a.alpha + 0.005);
    if (a.alpha <= 0) return;
    let px = a.x, py = H; ctx.globalAlpha = a.alpha; ctx.shadowBlur = 10; ctx.shadowColor = a.color;
    for(let i = 1; i <= a.segments; i++) {
      ctx.beginPath(); ctx.moveTo(px, py);
      const y = H-(i*a.segLen), x = a.x+Math.sin(t*0.3+a.phase+i*0.1)*(i*2.5);
      ctx.lineWidth = a.w*(1-i/a.segments)+0.5; ctx.lineTo(x, y); ctx.strokeStyle = a.color; ctx.lineCap = 'round'; ctx.stroke(); px = x; py = y;
    }
  });
  CORALS.forEach(c => {
    if (elapsed > 40) c.alpha = Math.min(1, c.alpha + 0.005);
    if (c.alpha <= 0) return;
    ctx.save(); ctx.translate(c.x, H); ctx.rotate(c.rot); ctx.globalAlpha = c.alpha;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-c.size, -c.size*0.5, 0, -c.size); ctx.quadraticCurveTo(c.size, -c.size*0.5, 0, 0);
    ctx.fillStyle = c.color; ctx.shadowBlur = 15; ctx.shadowColor = c.color; ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

const WHALES = [];
function createWhale(isLocal = true, ry, forcedSpeed) {
  const speed = forcedSpeed !== undefined ? forcedSpeed : 1.2 + Math.random() * 0.8;
  const yPos = ry !== undefined ? ry * H : 200 + Math.random() * (H - 400);
  WHALES.push({ x: -1000, y: yPos, w: 600 + Math.random() * 300, h: 90 + Math.random() * 50, speed, isLocal });
  if (isLocal) SessionManager.sendInteraction('WHALE', { x: 0, y: yPos / H, speed });
}
function drawWhales(t) {
  WHALES.forEach((w, i) => {
    if (isRecordingPhase && !w.isLocal) return;
    w.x += w.speed;
    const bodySway = Math.sin(t * 0.4) * 25, flukeSway = Math.sin(t * 0.8) * 50;
    ctx.save(); ctx.translate(w.x, w.y + bodySway);
    const grad = ctx.createLinearGradient(w.w*0.2, -w.h, w.w*0.2, w.h);
    grad.addColorStop(0, 'rgba(0, 200, 255, 0.5)'); grad.addColorStop(0.4, 'rgba(30, 80, 140, 0.7)'); grad.addColorStop(1, 'rgba(5, 15, 40, 0.6)');
    ctx.shadowBlur = 40; ctx.shadowColor = 'rgba(0, 150, 255, 0.4)';
    ctx.beginPath(); ctx.moveTo(w.w, 0); ctx.bezierCurveTo(w.w*0.8, -w.h*1.2, w.w*0.3, -w.h*0.5, 0, flukeSway*0.3);
    ctx.lineTo(-w.w*0.1, flukeSway - 40); ctx.lineTo(-w.w*0.1, flukeSway + 40); ctx.lineTo(0, flukeSway*0.3);
    ctx.bezierCurveTo(w.w*0.3, w.h*0.8, w.w*0.8, w.h*1.2, w.w, 0);
    ctx.fillStyle = grad; ctx.fill(); ctx.restore();
    if (w.x > W + 1200) WHALES.splice(i, 1);
  });
}

const JELLYFISH = [];
function createJellyfish(x, y, isLocal = true, forcedColorIdx, fvx, fvy) {
  const cIdx = forcedColorIdx !== undefined ? forcedColorIdx : Math.floor(Math.random()*FISH_COLORS.length);
  const vx = fvx !== undefined ? fvx : (Math.random()-0.5)*0.4, vy = fvy !== undefined ? fvy : -0.2-Math.random()*0.4;
  JELLYFISH.push({ x, y, size: 40+Math.random()*30, vx, vy, alpha: 0, born: elapsed, color: FISH_COLORS[cIdx], isLocal });
  if (isLocal) SessionManager.sendInteraction('JELLYFISH', { x, y, colorIdx: cIdx, vx, vy });
}
function drawJellyfish(t) {
  const bass = AudioEngine.intensity;
  JELLYFISH.forEach((j, i) => {
    if (isRecordingPhase && !j.isLocal) return;
    j.x += j.vx; j.y += j.vy; j.alpha = Math.min(0.6, j.alpha + 0.01);
    const s = j.size * (Math.sin(t * 1.5 + j.born) * 0.1 + 1);
    ctx.save(); ctx.globalAlpha = j.alpha; ctx.shadowBlur = 20 + 30 * bass; ctx.shadowColor = j.color; ctx.fillStyle = j.color; ctx.strokeStyle = j.color;
    ctx.beginPath(); ctx.moveTo(j.x - s, j.y); ctx.bezierCurveTo(j.x - s, j.y - s * 1.2, j.x + s, j.y - s * 1.2, j.x + s, j.y); ctx.lineTo(j.x - s, j.y); ctx.fill();
    const ts = s * 0.5, bw = s * 0.25;
    for (let k = 0; k < 4; k++) {
      let tx = j.x - s * 0.75 + k * ts, px = tx, py = j.y;
      for (let seg = 1; seg <= 8; seg++) {
        const vy = j.y + seg * (s * 0.5), vx = tx + Math.sin(t * 2.5 + seg * 0.8 + j.born) * (s * 0.4);
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(vx, vy); ctx.lineWidth = bw * (1 - seg / 8) + 1; ctx.stroke(); px = vx; py = vy;
      }
    }
    ctx.restore(); if (j.y < -400) JELLYFISH.splice(i, 1);
  });
}

const AudioEngine = {
  ctx: null, analyser: null, data: null, intensity: 0, active: false,
  async init(file) {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const audBuf = await this.ctx.decodeAudioData(await file.arrayBuffer());
    const source = this.ctx.createBufferSource(); source.buffer = audBuf; source.loop = true;
    this.analyser = this.ctx.createAnalyser(); this.analyser.fftSize = 256;
    this.data = new Uint8Array(this.analyser.frequencyBinCount);
    source.connect(this.analyser); this.analyser.connect(this.ctx.destination);
    source.start(0); this.active = true; await this.ctx.resume();
  },
  update() {
    if (!this.active || paused) { this.intensity = 0; return; }
    this.analyser.getByteFrequencyData(this.data);
    let sum = 0; for (let i=0; i<12; i++) sum += this.data[i];
    this.intensity = (sum/12)/255;
  }
};

let beatActive = false;
function loop(ts) {
  if (!running) { lastFrameTime = ts; return; }
  const dt = (ts - lastFrameTime) / 1000; lastFrameTime = ts;
  if (paused) { requestAnimationFrame(loop); return; }
  elapsed += dt; AudioEngine.update();
  if (AudioEngine.intensity > 0.62 && !beatActive) {
      const candidates = FISH.filter(f => f.flash < 0.1);
      const shuffled = candidates.sort(() => 0.5 - Math.random());
      for(let i=0; i<Math.min(3, shuffled.length); i++) { shuffled[i].flash = 2.5; }
      beatActive = true;
  } else if (AudioEngine.intensity < 0.55) { beatActive = false; }
  
  ctx.fillStyle = "#000"; ctx.fillRect(0,0,W,H);
  let lMix = Math.min(1, Math.max(0, (elapsed - 23) / 15)), dMix = (elapsed > 90) ? Math.min(1, (elapsed - 90) / 10) : 0, fMix = lMix * (1 - dMix);
  ctx.fillStyle = `rgb(${1*(1-fMix)+2*fMix}, ${2*(1-fMix)+15*fMix}, ${8*(1-fMix)+60*fMix})`; ctx.fillRect(0, 0, W, H);
  
  drawSnow(elapsed); drawPlants(elapsed); drawFish(elapsed); drawJellyfish(elapsed); drawWhales(elapsed);
  
  if (isRecordingPhase && recorder && recorder.state === 'recording') {
    const fH = Math.floor(H * 0.75), fW = Math.floor(fH * 0.75);
    offscreenCtx.fillStyle = "#001"; offscreenCtx.fillRect(0,0,fW,fH);
    offscreenCtx.drawImage(mainCanvas, (W - fW) / 2, (H - fH) / 2, fW, fH, 0, 0, fW, fH);
  }
  
  const status = document.getElementById('status');
  if (elapsed < 60) status.textContent = "gestalte deine tiefe...";
  else if (elapsed < 65) { 
    status.textContent = "bereitmachen..."; 
    document.getElementById('souvenirUI').style.display = 'flex'; 
    document.getElementById('countdown').textContent = Math.ceil(65 - elapsed); 
  }
  else if (elapsed < 75) { 
    if(!isRecordingPhase) {
      isRecordingPhase = true;
      chunks = [];
      const stream = offscreenCanvas.captureStream(30);
      recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
      recorder.ondataavailable = ev => { if(ev.data.size > 0) chunks.push(ev.data); };
      recorder.onstop = () => uploadVideo();
      recorder.start();
    }
    document.getElementById('souvenirUI').style.display = 'none'; 
    document.getElementById('captureFrame').style.display = 'block'; 
  }
  else if (!finalTriggered) {
    finalTriggered = true;
    document.getElementById('finalScreen').style.display = 'flex';
    document.getElementById('captureFrame').style.display = 'none';
    if (recorder && recorder.state === 'recording') recorder.stop();
    else uploadVideo();
  }
  const secs = Math.floor(elapsed);
  document.getElementById('timerText').textContent = String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
  requestAnimationFrame(loop);
}

async function startExperience(asGuest = false) {
  document.getElementById('startScreen').style.opacity = '0';
  setTimeout(() => { document.getElementById('startScreen').style.display = 'none'; }, 2000);
  document.getElementById('sessionUI').style.display = 'block';
  initPlants();
  if (!asGuest) {
    const file = audioInput.files[0]; if(!file) return;
    await AudioEngine.init(file);
    if (conn && conn.open) conn.send({ type: 'START_EXPERIENCE' });
  }
  running = true; lastFrameTime = performance.now(); requestAnimationFrame(loop);
}

async function uploadVideo() {
  const safeName = (myName || "guest").replace(/[^a-z0-9]/gi, '_');
  const publicId = `${sessionId}_${safeName}`;
  const mintURL = MINT_BASE_URL + publicId;
  const msg = document.getElementById('uploadMsg'), btn = document.getElementById('mintBtn');
  if (!chunks.length) { msg.textContent = "fehler: keine aufnahme"; return; }
  try {
    msg.textContent = 'lade dein souvenir hoch...';
    const blob = new Blob(chunks, { type: 'video/webm' });
    const fd = new FormData();
    fd.append('file', blob);
    fd.append('upload_preset', 'artbox');
    fd.append('public_id', publicId);
    const res = await fetch(`https://api.cloudinary.com/v1_1/dvsypjad8/video/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    if(data.secure_url) { msg.textContent = 'dein souvenir ist bereit!'; btn.href = mintURL; btn.style.display = 'inline-block'; }
    else { msg.textContent = 'upload fehler - versuche es erneut'; }
  } catch (e) { msg.textContent = 'verbindungsfehler'; }
}

document.getElementById('startBtn').onclick = () => audioInput.click();
audioInput.onchange = e => { if (e.target.files.length) startExperience(false); };
document.getElementById('pauseBtn').onclick = () => { paused = !paused; if (AudioEngine.ctx) paused ? AudioEngine.ctx.suspend() : AudioEngine.ctx.resume(); };

const handleInput = (x, y) => {
  const v = getVirtualCoords(x, y);
  gesturePath.push({x: v.x, y: v.y}); if (gesturePath.length > 40) gesturePath.shift();
  lastTouchPos = v;
  if (elapsed > 23 && checkSwirl()) jellyfishPending = true;
  const dx = v.x - lastSwipeX, currentDir = dx > 0 ? 1 : -1;
  if (currentDir !== lastSwipeDir && Math.abs(dx) > 15) {
    swipeCount++; lastSwipeDir = currentDir;
    if (swipeCount >= 4 && elapsed > 30) whalePending = true;
  }
  lastSwipeX = v.x;
};
function checkSwirl() {
  if (gesturePath.length < 20) return false;
  let rot = 0;
  for (let i = 2; i < gesturePath.length; i++) {
    const v1 = {x: gesturePath[i-1].x-gesturePath[i-2].x, y: gesturePath[i-1].y-gesturePath[i-2].y}, v2 = {x: gesturePath[i].x-gesturePath[i-1].x, y: gesturePath[i].y-gesturePath[i-1].y};
    const angle = Math.atan2(v2.y, v2.x) - Math.atan2(v1.y, v1.x);
    rot += (angle > Math.PI) ? angle - 2*Math.PI : (angle < -Math.PI) ? angle + 2*Math.PI : angle;
  }
  return Math.abs(rot) > Math.PI * 1.8;
}

window.addEventListener('mousemove', e => { if(isMouseDown) handleInput(e.clientX, e.clientY); });
window.addEventListener('touchmove', e => handleInput(e.touches[0].clientX, e.touches[0].clientY), {passive: false});

const onDown = (clientX, clientY) => {
  isMouseDown = true; jellyfishPending = false; whalePending = false;
  const v = getVirtualCoords(clientX, clientY);
  lastSwipeX = v.x; gesturePath = []; swipeCount = 0;
};
window.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
window.addEventListener('touchstart', e => onDown(e.touches[0].clientX, e.touches[0].clientY));

const onUp = () => {
    if (!isMouseDown) return;
    isMouseDown = false;
    if (jellyfishPending) { createJellyfish(lastTouchPos.x, lastTouchPos.y, true); jellyfishPending = false; }
    else if (whalePending) { createWhale(true, lastTouchPos.y / H); whalePending = false; }
};
window.addEventListener('mouseup', onUp); window.addEventListener('touchend', onUp);
window.addEventListener('dblclick', e => { if (running) { const v = getVirtualCoords(e.clientX, e.clientY); createFishSchool(v.x, v.y, Math.random() > 0.5 ? 1 : -1, true); } });
</script>
