<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abyssal Glow - Collaborative Artcube</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; width: 100vw; height: 100vh; }
canvas#main { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

/* Orientation Overlay */
#orientationOverlay {
  position: fixed; inset: 0; background: #000; z-index: 100;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
}
#orientationOverlay svg { width: 50px; height: 50px; fill: #fff; margin-bottom: 1.5rem; animation: rotate 2s infinite ease-in-out; }
@keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
@media (orientation: portrait) { #orientationOverlay { display: flex; } }

/* Start Screen Styles */
#startScreen {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10; text-align: center;
  transition: opacity 3s ease-in-out; padding: 1rem;
}
#startScreen h1 { font-size: clamp(1.5rem, 8vw, 4rem); font-weight: 200; letter-spacing: .3em; margin-bottom: .6rem; }
#startScreen p  { font-size: clamp(0.6rem, 2.5vw, 0.85rem); color: rgba(255,255,255,.4); letter-spacing: .12em; margin-bottom: 1.5rem; font-weight: 300; max-width: 80%; }

/* Name & Session UI */
#setupUI { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 0.8rem; }
input#userName {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 0.8rem; font-size: 0.9rem; letter-spacing: 0.1em;
  text-align: center; outline: none; border-radius: 0; width: 100%;
}
#joinBtn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
  color: #fff; padding: 0.8rem; cursor: pointer; letter-spacing: 0.1em; 
  font-family: inherit; font-size: 0.75rem; border-radius: 0; width: 100%;
}

#shareLinkArea {
  margin-top: 1rem; padding: 0.8rem; background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.1); display: none; width: 100%;
}
#shareLinkArea small { display: block; margin-bottom: 0.5rem; color: rgba(255,255,255,0.3); font-size: 0.65rem; letter-spacing: 0.1em; }
#sessionLink { 
  font-size: 0.65rem; color: #00f2ff; word-break: break-all; cursor: pointer; 
  text-decoration: underline; background: transparent; border: none; font-family: inherit; width: 100%;
}

#startBtn {
  background: transparent; border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.8); padding: .75rem 2.5rem;
  font-size: .8rem; letter-spacing: .2em; cursor: pointer; transition: all .4s; font-family: inherit;
  margin-top: 1.5rem; display: none;
}

/* Status Bar */
#onlineStatus {
  position: absolute; bottom: 2rem; left: 2rem;
  display: flex; flex-direction: column; gap: 0.6rem;
  text-align: left; pointer-events: none; z-index: 11;
}
.user-row { display: flex; align-items: center; gap: 0.6rem; opacity: 0; transition: opacity 0.5s; }
.user-row.visible { opacity: 1; }
.status-dot { width: 6px; height: 6px; background: #00ff9f; border-radius: 50%; box-shadow: 0 0 8px #00ff9f; transition: background 0.3s; }
.status-dot.offline { background: #ff4b4b; box-shadow: 0 0 8px #ff4b4b; }
.user-name { font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); text-transform: uppercase; }

/* Base Styles */
#sessionUI { position: fixed; top: 1.5rem; left: 0; right: 0; text-align: center; z-index: 10; display: none; pointer-events: none; }
#pauseBtn { background: transparent; border: 1px solid rgba(255,255,255,.22); color: rgba(255,255,255,.45); padding: .2rem .9rem; font-size: .65rem; letter-spacing: .18em; cursor: pointer; font-family: inherit; transition: all .3s; vertical-align: middle; margin-left: .8rem; pointer-events: all; }
#timer  { font-size: .7rem; letter-spacing: .25em; color: rgba(255,255,255,.3); margin-bottom: .4rem; }
#status { font-size: .8rem; letter-spacing: .08em; color: rgba(255,255,255,.45); font-weight: 300; }
#souvenirUI { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5; pointer-events: none; font-size: 1.5rem; letter-spacing: 0.2em; color: #fff; text-transform: uppercase; }
#captureFrame { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.8); display: none; z-index: 4; box-shadow: 0 0 0 5000px rgba(0,0,0,0.4); }
#qrScreen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; transition: opacity 10s linear; }
#qrBox { background: #fff; padding: 1rem; margin-bottom: 1rem; }
#qrText { font-size: 0.85rem; color: #fff; letter-spacing: 0.1em; text-align: center; max-width: 80%; }
#uploadMsg { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 1.5rem; letter-spacing: 0.1em; }
input[type="file"] { display: none; }
</style>
</head>
<body>

<div id="orientationOverlay">
  <svg viewBox="0 0 24 24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
  <p>Bitte drehe dein Gerät ins Querformat.</p>
</div>

<canvas id="main"></canvas>
<input type="file" id="audioInput" accept="audio/*">

<div id="startScreen">
  <h1>abyssal<span style="opacity:.28">.</span>glow</h1>
  <p id="subline">wähle musik &middot; gestalte deine tiefe &middot; minte dein nft</p>
  
  <div id="setupUI">
    <div class="input-group">
      <input type="text" id="userName" placeholder="DEIN NAME" maxlength="15">
      <button id="joinBtn">BEITRETEN</button>
    </div>
    
    <div id="shareLinkArea">
      <small>Lade jemanden ein:</small>
      <button id="sessionLink">Link kopieren</button>
    </div>
  </div>

  <button id="startBtn">START</button>

  <div id="onlineStatus">
    <div id="user1" class="user-row">
      <div class="status-dot" id="dot1"></div>
      <div class="user-name"><span id="name1"></span> <span id="statText1">offline</span></div>
    </div>
    <div id="user2" class="user-row">
      <div class="status-dot" id="dot2"></div>
      <div class="user-name"><span id="name2"></span> <span id="statText2">offline</span></div>
    </div>
  </div>
</div>

<div id="sessionUI">
  <div id="timer"><span id="timerText">00:00</span> <button id="pauseBtn">PAUSE</button></div>
  <div id="status">initialisierung...</div>
</div>

<div id="souvenirUI">Erstelle dein Souvenir in <span id="countdown">5</span></div>
<div id="captureFrame"></div>

<div id="qrScreen">
  <div id="uploadMsg">verbinde zur blockchain...</div>
  <div id="qrBox"></div>
  <div id="qrText">Scanne den Code um dein Souvenir einzusammeln.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// --- SESSION LOGIC (PEERJS) ---
const urlParams = new URLSearchParams(window.location.search);
let sessionId = urlParams.get('sid') || 'art-' + Math.random().toString(36).substring(2, 8);
let isHost = !urlParams.get('sid');
let myName = localStorage.getItem('artcube_name') || "";
let peer = null;
let conn = null;

const SessionManager = {
  users: [], // { name, status }
  retryCount: 0,
  
  init() {
    if (myName) document.getElementById('userName').value = myName;
    const linkBtn = document.getElementById('sessionLink');
    const currentUrl = window.location.origin + window.location.pathname;
    const fullLink = currentUrl + '?sid=' + sessionId;
    linkBtn.textContent = fullLink;
    linkBtn.onclick = () => {
      navigator.clipboard.writeText(fullLink);
      linkBtn.textContent = "KOPIERT!";
      setTimeout(() => { linkBtn.textContent = fullLink; }, 2000);
    };
    document.getElementById('joinBtn').onclick = () => this.join();
    const peerId = isHost ? sessionId : null;
    peer = new Peer(peerId, { debug: 2, config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
    peer.on('open', id => { if (!isHost) this.connectToHost(); });
    peer.on('connection', c => { conn = c; this.setupConnection(); });
    window.addEventListener('beforeunload', () => this.sendStatus('offline'));
    window.addEventListener('resize', () => {
      const isPortrait = window.innerHeight > window.innerWidth;
      this.sendStatus(isPortrait ? 'offline' : 'online');
    });
  },

  connectToHost() {
    console.log("Verbinde zu Host...");
    conn = peer.connect(sessionId, { reliable: true });
    this.setupConnection();
    setTimeout(() => { if ((!conn || !conn.open) && this.retryCount < 5) { this.retryCount++; this.connectToHost(); } }, 4000);
  },

  setupConnection() {
    conn.on('open', () => {
      console.log("P2P Verbindung offen!");
      this.retryCount = 0;
      if (myName) this.sendStatus('online');
    });
    conn.on('data', (data) => {
      console.log("Empfangen:", data);
      if (data.type === 'STATUS') {
        this.updateUser(data.name, data.status);
        if (isHost && data.status === 'online') this.sendStatus('online');
      }
      if (data.type === 'START_EXPERIENCE') startExperience(true);
      if (data.type === 'INTERACTION') {
        if (data.kind === 'FISH_SCHOOL') createFishSchool(data.x, data.y, data.dir, false);
        if (data.kind === 'JELLYFISH') createJellyfish(data.x, data.y, false);
        if (data.kind === 'WHALE') createWhale(false);
      }
    });
    conn.on('close', () => { if (this.users[1]) this.updateUser(this.users[1].name, 'offline'); });
  },

  sendStatus(status) { if (conn && conn.open && myName) conn.send({ type: 'STATUS', name: myName, status: status }); },
  sendInteraction(kind, data) { if (conn && conn.open) conn.send({ type: 'INTERACTION', kind, ...data }); },

  join() {
    myName = document.getElementById('userName').value.trim();
    if (!myName) return;
    localStorage.setItem('artcube_name', myName);
    this.updateUser(myName, 'online');
    if (conn && conn.open) this.sendStatus('online');
    document.getElementById('userName').disabled = true;
    document.getElementById('joinBtn').style.display = 'none';
    if (isHost) {
      document.getElementById('shareLinkArea').style.display = 'block';
      document.getElementById('startBtn').style.display = 'block';
    } else {
      document.getElementById('subline').innerHTML = "Warte auf den Host...";
    }
  },

  updateUser(name, status) {
    let user = this.users.find(u => u.name === name);
    if (!user) {
      user = { name, status };
      this.users.push(user);
    } else user.status = status;
    this.updateUI();
  },

  updateUI() {
    this.users.forEach((u, i) => {
      const idx = i + 1;
      const row = document.getElementById('user' + idx);
      if (row) {
        document.getElementById('name' + idx).textContent = u.name;
        document.getElementById('statText' + idx).textContent = u.status;
        document.getElementById('dot' + idx).className = 'status-dot ' + (u.status === 'offline' ? 'offline' : '');
        row.classList.add('visible');
      }
    });
  }
};
SessionManager.init();

// --- ANIMATION LOGIC ---
const mainCanvas = document.getElementById('main'), ctx = mainCanvas.getContext('2d');
const offscreenCanvas = document.createElement('canvas'), offscreenCtx = offscreenCanvas.getContext('2d');
let W, H, running = false, paused = false, canInteract = true, isRecordingPhase = false;
let elapsed = 0, lastFrameTime = 0, isMouseDown = false, lastSwipeX = 0, lastSwipeDir = 0, swipeCount = 0, gesturePath = [];
let recorder = null, chunks = [];

function resize() {
  W = mainCanvas.width = window.innerWidth; H = mainCanvas.height = window.innerHeight;
  const fH = Math.floor(H * 0.75), fW = Math.floor(fH * 0.75);
  const frame = document.getElementById('captureFrame');
  if (frame) { frame.style.width = fW + 'px'; frame.style.height = fH + 'px'; }
  offscreenCanvas.width = fW; offscreenCanvas.height = fH;
}
window.addEventListener('resize', resize); resize();

const FISH = [], FISH_COLORS = ['#00f2ff', '#00ff9f', '#ff00e5', '#bd00ff', '#f0ff00'];
function createFish(x, y, vx, vy, isLocal = true) {
  FISH.push({ x, y, vx, vy, size: (W<600?2:4)+Math.random()*5, color: FISH_COLORS[Math.floor(Math.random()*FISH_COLORS.length)], born: elapsed, flash: 0, isLocal });
}
function createFishSchool(x, y, dir, isLocal = true) {
  const count = (elapsed >= 12) ? 4 + Math.floor(Math.random() * 4) : 1;
  for (let i = 0; i < count; i++) {
    const ox = (Math.random() - 0.5) * 60, oy = (Math.random() - 0.5) * 60;
    const svx = dir * (0.15 + Math.random() * 0.15);
    createFish(x + ox, y + oy, svx, (Math.random()-0.5)*0.02, isLocal);
  }
  if (isLocal) SessionManager.sendInteraction('FISH_SCHOOL', { x, y, dir });
}
function drawFish(t) {
  const bass = AudioEngine.intensity;
  for (let i = FISH.length - 1; i >= 0; i--) {
    const f = FISH[i];
    if (isRecordingPhase && !f.isLocal) continue;
    f.x += f.vx * (1 + bass * 1.5); f.y += f.vy * (1 + bass * 1.5);
    if (f.flash > 0) f.flash *= 0.90;
    const osc = Math.sin(t * 8 + f.born) * 2, angle = f.vx > 0 ? 0 : Math.PI;
    ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(angle); if (f.vx < 0) ctx.scale(1, -1);
    ctx.beginPath(); ctx.ellipse(0, 0, f.size * 1.5, f.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = f.color; ctx.shadowBlur = 15 + (f.flash * 40); ctx.shadowColor = f.color;
    if (f.flash > 0.1) ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(-f.size * 1.2, 0); ctx.lineTo(-f.size * 2, osc); ctx.lineTo(-f.size * 2, -osc); ctx.closePath();
    ctx.fillStyle = f.color; ctx.fill(); ctx.restore();
    if (f.x < -200 || f.x > W + 200 || t - f.born > 25) FISH.splice(i, 1);
  }
}

const SNOW_PARTICLES = Array.from({ length: 400 }, () => ({ x: Math.random(), y: Math.random(), size: 0.5+Math.random()*1.5, speedY: 0.0001+Math.random()*0.0004, driftX: (Math.random()-0.5)*0.0001, alpha: 0.1+Math.random()*0.4, isReactive: Math.random()>0.8, glow: 0 }));
function drawSnow(t) {
  const bass = AudioEngine.intensity;
  SNOW_PARTICLES.forEach(p => {
    p.y += p.speedY * (1 + bass*3); p.x += p.driftX;
    if (p.y > 1.05) { p.y = -0.05; p.x = Math.random(); }
    if (p.isReactive && bass > 0.5) p.glow = Math.max(p.glow, bass*2.5);
    p.glow *= 0.92;
    const px = p.x*W, py = p.y*H;
    ctx.shadowBlur = p.glow*25; ctx.shadowColor = '#00ffff';
    ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha + p.glow})`;
    const s = p.size * (1+p.glow*1.5);
    ctx.fillRect(px, py, s, s);
  });
}

const ALGAE = [], CORALS = [];
function initPlants() {
  for(let i=0; i<12; i++) ALGAE.push({ x: Math.random() * W, segments: 10 + Math.random() * 10, segLen: 5 + Math.random() * 5, w: 10 + Math.random() * 10, phase: Math.random() * Math.PI * 2, color: `hsl(${130 + Math.random() * 40}, 40%, 15%)`, alpha: 0 });
  for(let i=0; i<8; i++) CORALS.push({ x: Math.random() * W, size: 20 + Math.random() * 30, color: `hsl(${Math.random() * 360}, 60%, 40%)`, alpha: 0, rot: Math.random() * 0.4 - 0.2 });
}
function drawPlants(t) {
  ALGAE.forEach(a => {
    if (elapsed > 12) a.alpha = Math.min(0.8, a.alpha + 0.005);
    if (a.alpha <= 0) return;
    let px = a.x, py = H; ctx.globalAlpha = a.alpha; ctx.shadowBlur = 10; ctx.shadowColor = a.color;
    for(let i = 1; i <= a.segments; i++) {
      ctx.beginPath(); ctx.moveTo(px, py);
      const y = H - (i * a.segLen), x = a.x + Math.sin(t * 0.3 + a.phase + i * 0.1) * (i * 1.5);
      ctx.lineWidth = a.w * (1 - i / a.segments) + 0.5; ctx.lineTo(x, y); ctx.strokeStyle = a.color; ctx.lineCap = 'round'; ctx.stroke();
      px = x; py = y;
    }
  });
  CORALS.forEach(c => {
    if (elapsed > 40) c.alpha = Math.min(1, c.alpha + 0.005);
    if (c.alpha <= 0) return;
    ctx.save(); ctx.translate(c.x, H); ctx.rotate(c.rot); ctx.globalAlpha = c.alpha;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-c.size, -c.size*0.5, 0, -c.size); ctx.quadraticCurveTo(c.size, -c.size*0.5, 0, 0);
    ctx.fillStyle = c.color; ctx.shadowBlur = 15; ctx.shadowColor = c.color; ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

const WHALES = [];
function createWhale(isLocal = true) {
  const whaleW = (W < 600 ? 300 : 500) + Math.random() * 200;
  WHALES.push({ x: -800, y: 100 + Math.random() * (H - 400), w: whaleW, h: whaleW * 0.12, speed: (0.5 + Math.random() * 0.3) * 1.5, isLocal });
  if (isLocal) SessionManager.sendInteraction('WHALE', {});
}
function drawWhales(t) {
  WHALES.forEach((w, i) => {
    if (isRecordingPhase && !w.isLocal) return;
    w.x += w.speed;
    const bodySway = Math.sin(t * 0.4) * 15, flukeSway = Math.sin(t * 0.8) * 35;
    ctx.save(); ctx.translate(w.x, w.y + bodySway);
    const grad = ctx.createLinearGradient(w.w*0.2, -w.h, w.w*0.2, w.h);
    grad.addColorStop(0, 'rgba(0, 200, 255, 0.5)'); grad.addColorStop(0.4, 'rgba(30, 80, 140, 0.7)'); grad.addColorStop(1, 'rgba(5, 15, 40, 0.6)');
    ctx.shadowBlur = 30; ctx.shadowColor = 'rgba(0, 150, 255, 0.4)';
    ctx.beginPath(); ctx.moveTo(w.w, 0); ctx.bezierCurveTo(w.w*0.8, -w.h*1.2, w.w*0.3, -w.h*0.5, 0, flukeSway*0.3);
    ctx.lineTo(-w.w*0.1, flukeSway - 30); ctx.lineTo(-w.w*0.1, flukeSway + 30); ctx.lineTo(0, flukeSway*0.3);
    ctx.bezierCurveTo(w.w*0.3, w.h*0.8, w.w*0.8, w.h*1.2, w.w, 0);
    ctx.fillStyle = grad; ctx.fill(); ctx.restore();
    if (w.x > W + 800) WHALES.splice(i, 1);
  });
}

const JELLYFISH = [];
function createJellyfish(x, y, isLocal = true) {
  JELLYFISH.push({ x, y, size: (W<600?10:20)+Math.random()*20, vx: (Math.random()-0.5)*0.3, vy: -0.2-Math.random()*0.3, alpha: 0, born: elapsed, color: FISH_COLORS[Math.floor(Math.random()*FISH_COLORS.length)], isLocal });
  if (isLocal) SessionManager.sendInteraction('JELLYFISH', { x, y });
}
function drawJellyfish(t) {
  const bass = AudioEngine.intensity;
  JELLYFISH.forEach((j, i) => {
    if (isRecordingPhase && !j.isLocal) return;
    j.x += j.vx; j.y += j.vy; j.alpha = Math.min(0.6, j.alpha + 0.01);
    const s = j.size * (Math.sin(t * 1.5 + j.born) * 0.1 + 1);
    ctx.save(); ctx.globalAlpha = j.alpha; ctx.shadowBlur = 15 + 20 * bass; ctx.shadowColor = j.color; ctx.fillStyle = j.color; ctx.strokeStyle = j.color;
    ctx.beginPath(); ctx.moveTo(j.x - s, j.y); ctx.bezierCurveTo(j.x - s, j.y - s * 1.2, j.x + s, j.y - s * 1.2, j.x + s, j.y); ctx.lineTo(j.x - s, j.y); ctx.fill();
    const ts = s * 0.5, bw = s * 0.25;
    for (let k = 0; k < 4; k++) {
      let tx = j.x - s * 0.75 + k * ts, px = tx, py = j.y;
      for (let seg = 1; seg <= 8; seg++) {
        const vy = j.y + seg * (s * 0.45), vx = tx + Math.sin(t * 2.5 + seg * 0.8 + j.born) * (s * 0.35);
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(vx, vy); ctx.lineWidth = bw * (1 - seg / 8) + 1; ctx.stroke(); px = vx; py = vy;
      }
    }
    ctx.restore(); if (j.y < -300) JELLYFISH.splice(i, 1);
  });
}

const AudioEngine = {
  ctx: null, analyser: null, data: null, source: null, gain: null, intensity: 0, active: false,
  async init(file) {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const audBuf = await this.ctx.decodeAudioData(await file.arrayBuffer());
    this.source = this.ctx.createBufferSource(); this.source.buffer = audBuf; this.source.loop = true;
    this.analyser = this.ctx.createAnalyser(); this.analyser.fftSize = 256;
    this.data = new Uint8Array(this.analyser.frequencyBinCount);
    this.gain = this.ctx.createGain(); this.gain.gain.value = 0.75;
    this.source.connect(this.gain); this.gain.connect(this.analyser); this.analyser.connect(this.ctx.destination);
    this.source.start(0); this.active = true;
  },
  update() {
    if (!this.active || paused) { this.intensity = 0; return; }
    this.analyser.getByteFrequencyData(this.data);
    let sum = 0; for (let i=0; i<12; i++) sum += this.data[i];
    this.intensity = (sum/12)/255;
  }
};

let beatActive = false;
function loop(ts) {
  if (!running) { lastFrameTime = ts; return; }
  const dt = (ts - lastFrameTime) / 1000; lastFrameTime = ts;
  if (paused) { requestAnimationFrame(loop); return; }
  elapsed += dt; AudioEngine.update();
  
  // 2) Streng limitierte Beat-Logik: Nur 3 Fische pro Beat-Ereignis
  if (AudioEngine.intensity > 0.62) {
      if (!beatActive) {
          const candidates = FISH.filter(f => f.flash < 0.1);
          // Mische die Kandidaten und nimm die ersten 3
          const shuffled = candidates.sort(() => 0.5 - Math.random());
          for(let i=0; i<Math.min(3, shuffled.length); i++) {
              shuffled[i].flash = 2.5;
          }
          beatActive = true; // Sperre aktivieren
      }
  } else if (AudioEngine.intensity < 0.55) {
      beatActive = false; // Sperre erst wieder lösen, wenn Bass nachlässt
  }

  let globalAlpha = (elapsed > 90) ? Math.max(0, 1 - (elapsed - 90) / 10) : 1.0;
  ctx.globalAlpha = globalAlpha;

  // BG
  let lightMix = Math.min(1, Math.max(0, (elapsed - 23) / 15)), darkMix = (elapsed > 90) ? Math.min(1, (elapsed - 90) / 10) : 0, finalMix = lightMix * (1 - darkMix);
  const r = 1*(1-finalMix)+2*finalMix, g = 2*(1-finalMix)+15*finalMix, b = 8*(1-finalMix)+60*finalMix;
  ctx.fillStyle = `rgb(${r}, ${g}, ${b})`; ctx.fillRect(0, 0, W, H);

  // 1) Marine Snow wieder aktivieren
  drawSnow(elapsed);
  drawPlants(elapsed); drawFish(elapsed); drawJellyfish(elapsed); drawWhales(elapsed);

  if (recorder && recorder.state === 'recording') {
    const fH = Math.floor(H * 0.75), fW = Math.floor(fH * 0.75);
    offscreenCtx.drawImage(mainCanvas, (W - fW) / 2, (H - fH) / 2, fW, fH, 0, 0, fW, fH);
  }

  const status = document.getElementById('status');
  if (elapsed < 60) status.textContent = "gestalte deine tiefe...";
  else if (elapsed < 65) { status.textContent = "bereitmachen..."; document.getElementById('souvenirUI').style.display = 'flex'; document.getElementById('countdown').textContent = Math.ceil(65 - elapsed); }
  else if (elapsed < 75) { isRecordingPhase = true; document.getElementById('souvenirUI').style.display = 'none'; document.getElementById('captureFrame').style.display = 'block'; if (recorder && recorder.state === 'inactive') recorder.start(); }
  else {
    document.getElementById('captureFrame').style.display = 'none';
    if (recorder && recorder.state === 'recording') { recorder.onstop = () => uploadVideo(); recorder.stop(); }
    document.getElementById('qrScreen').style.display = 'flex';
  }
  
  const secs = Math.floor(elapsed);
  document.getElementById('timerText').textContent = String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
  requestAnimationFrame(loop);
}

async function startExperience(asGuest = false) {
  document.getElementById('startScreen').style.opacity = '0';
  setTimeout(() => { document.getElementById('startScreen').style.display = 'none'; }, 3000);
  document.getElementById('sessionUI').style.display = 'block';
  initPlants();
  if (!asGuest) {
    const file = audioInput.files[0]; if(!file) return;
    await AudioEngine.init(file);
    if (conn && conn.open) conn.send({ type: 'START_EXPERIENCE' });
  }
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  recorder = new MediaRecorder(offscreenCanvas.captureStream(30), { mimeType });
  recorder.ondataavailable = ev => { if(ev.data.size > 0) chunks.push(ev.data); };
  running = true; lastFrameTime = performance.now(); requestAnimationFrame(loop);
}

async function uploadVideo() {
  const mintURL = MINT_BASE_URL + sessionId + "_" + (myName || "guest");
  const msg = document.getElementById('uploadMsg');
  try {
    msg.textContent = 'lade dein souvenir hoch...';
    const blob = new Blob(chunks, { type: 'video/webm' });
    const fd = new FormData();
    fd.append('file', blob, `${sessionId}_${myName}.webm`);
    fd.append('upload_preset', 'artbox');
    const res = await fetch(`https://api.cloudinary.com/v1_1/dvsypjad8/video/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    msg.textContent = data.secure_url ? 'bereit zum minten' : 'upload fehler';
  } catch (e) { msg.textContent = 'fehler'; }
  new QRCode(document.getElementById('qrBox'), { text: mintURL, width: 160, height: 160 });
}

document.getElementById('startBtn').onclick = () => audioInput.click();
audioInput.onchange = e => { if (e.target.files.length) startExperience(false); };
document.getElementById('pauseBtn').onclick = () => { paused = !paused; if (AudioEngine.ctx) paused ? AudioEngine.ctx.suspend() : AudioEngine.ctx.resume(); };

const handleInput = (x, y) => {
  if (!canInteract || isRecordingPhase) return;
  gesturePath.push({x, y}); if (gesturePath.length > 40) gesturePath.shift();
  if (elapsed > 23 && checkSwirl()) createJellyfish(x, y, true);
  const dx = x - lastSwipeX, currentDir = dx > 0 ? 1 : -1;
  if (currentDir !== lastSwipeDir && Math.abs(dx) > 15) {
    swipeCount++; lastSwipeDir = currentDir;
    if (swipeCount >= 4 && elapsed > 30) { createWhale(true); swipeCount = 0; }
  }
  lastSwipeX = x;
};
function checkSwirl() {
  if (gesturePath.length < 20) return false;
  let rot = 0;
  for (let i = 2; i < gesturePath.length; i++) {
    const v1 = {x: gesturePath[i-1].x-gesturePath[i-2].x, y: gesturePath[i-1].y-gesturePath[i-2].y}, v2 = {x: gesturePath[i].x-gesturePath[i-1].x, y: gesturePath[i].y-gesturePath[i-1].y};
    const angle = Math.atan2(v2.y, v2.x) - Math.atan2(v1.y, v1.x);
    rot += (angle > Math.PI) ? angle - 2*Math.PI : (angle < -Math.PI) ? angle + 2*Math.PI : angle;
  }
  return Math.abs(rot) > Math.PI * 1.8;
}
window.addEventListener('mousemove', e => { if(isMouseDown) handleInput(e.clientX, e.clientY); });
window.addEventListener('touchmove', e => handleInput(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
window.addEventListener('mousedown', e => { isMouseDown = true; lastSwipeX = e.clientX; });
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('touchstart', e => { lastSwipeX = e.touches[0].clientX; });
window.addEventListener('dblclick', e => { if (running && !isRecordingPhase) createFishSchool(e.clientX, e.clientY, Math.random() > 0.5 ? 1 : -1, true); });
</script>
