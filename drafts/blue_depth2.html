<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blue depth 2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; }
canvas#main { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
video { display: none; }
#startScreen {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 10; text-align: center;
  transition: opacity 3s ease-in-out; /* Visueller Fade */
}
#startScreen h1 { font-size: clamp(2rem,6vw,4rem); font-weight: 200; letter-spacing: .3em; margin-bottom: .6rem; }
#startScreen p  { font-size: .85rem; color: rgba(255,255,255,.4); letter-spacing: .12em; margin-bottom: 3rem; font-weight: 300; }
#startBtn {
  background: transparent; border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.8); padding: .75rem 2.5rem;
  font-size: .8rem; letter-spacing: .2em; cursor: pointer; transition: all .4s; font-family: inherit;
}
#startBtn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.5); color: #fff; }
#sessionUI {
  position: fixed; top: 1.5rem; left: 0; right: 0;
  text-align: center; z-index: 10; display: none; pointer-events: none;
}
#sessionUI #pauseBtn { pointer-events: all; }
#pauseBtn {
  background: transparent; border: 1px solid rgba(255,255,255,.22);
  color: rgba(255,255,255,.45); padding: .2rem .9rem;
  font-size: .65rem; letter-spacing: .18em;
  cursor: pointer; font-family: inherit; transition: all .3s;
  vertical-align: middle; margin-left: .8rem; display: none;
}
#pauseBtn:hover { border-color: rgba(255,255,255,.45); color: rgba(255,255,255,.85); }
#timer  { font-size: .7rem; letter-spacing: .25em; color: rgba(255,255,255,.3); margin-bottom: .4rem; }
#status { font-size: .8rem; letter-spacing: .08em; color: rgba(255,255,255,.45); font-weight: 300; }
.rec-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: #e84040; margin-right: 7px; vertical-align: middle;
  animation: blink .9s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
#qrScreen {
  position: fixed; inset: 0; background: rgba(0,0,0,.90);
  display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
}
#qrScreen h2 { font-size: 1rem; font-weight: 300; letter-spacing: .2em; margin-bottom: 2rem; color: rgba(255,255,255,.7); }
#qrBox { background: #fff; padding: 1.25rem; margin-bottom: 1.5rem; }
#qrScreen small { font-size: .7rem; color: rgba(255,255,255,.35); letter-spacing: .1em; margin-top: .75rem; display: block; }
#uploadMsg { font-size: .75rem; color: rgba(255,255,255,.35); letter-spacing: .06em; margin-top: 1rem; }
#restartBtn {
  margin-top: 2rem; background: transparent; border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.45); padding: .6rem 2rem; font-size: .75rem;
  letter-spacing: .15em; cursor: pointer; font-family: inherit; transition: all .3s;
}
#restartBtn:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }
</style>
</head>
<body>

<canvas id="main"></canvas>
<video id="webcam" autoplay playsinline muted></video>

<div id="startScreen">
  <h1>art<span style="opacity:.28">.</span>cube <span style="font-weight:100;opacity:.5">lite</span></h1>
  <p>bewege dich · forme dein kunstwerk · minte es als nft</p>
  <button id="startBtn">START</button>
</div>

<div id="sessionUI">
  <div id="timer"><span id="timerText">00:00</span> <button id="pauseBtn">PAUSE</button></div>
  <div id="status">bewege dich</div>
</div>

<div id="qrScreen">
  <h2>dein kunstwerk ist bereit</h2>
  <div id="qrBox"></div>
  <small>scanne um dein nft zu minten</small>
  <div id="uploadMsg">verbinde...</div>
  <button id="restartBtn">neue session</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>

const SESSION_DURATION = 40;
const RECORD_START     = 28;
const RECORD_DURATION  = 10;
const CLOUD_NAME       = 'dvsypjad8';
const UPLOAD_PRESET    = 'artbox';
const MINT_BASE_URL    = 'https://art-box-beta.vercel.app/mint?nft=';

const mainCanvas = document.getElementById('main');
const ctx        = mainCanvas.getContext('2d');
const video      = document.getElementById('webcam');

let W, H;
function resize() { W = mainCanvas.width = innerWidth; H = mainCanvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

let soundtrack = null;
let running = false, paused = false;
let sessionStart = 0, elapsed = 0;
let recording = false, recorder = null, chunks = [];
let sessionId = 'artcube_' + (typeof crypto.randomUUID === 'function' 
  ? crypto.randomUUID().replace(/-/g,'').slice(0,12) 
  : Math.random().toString(36).substring(2, 14));
let qrGenerated = false;

// ── WASSER: PARTIKEL-SYSTEM (Viel kleine blaue Partikel) ─────────────────
const WATER_PARTICLE_COUNT = 4500;
const WATER_PARTICLES = Array.from({ length: WATER_PARTICLE_COUNT }, () => ({
  x: Math.random(), 
  y: Math.random(), 
  size: 0.4 + Math.random() * 1.4,
  speedX: 0.0001 + Math.random() * 0.00028,
  phase: Math.random() * Math.PI * 2,
  hue: 184 + Math.random() * 14,
  sat: 45 + Math.random() * 25,
  lit: 25 + Math.random() * 25,
  alpha: 0.15 + Math.random() * 0.65,
}));

function drawWater(t) {
  WATER_PARTICLES.forEach(p => {
    p.x += p.speedX * 0.0625;
    if (p.x > 1.05) p.x = -0.05;
    const px = p.x * W;
    const wave1 = Math.sin(p.x * 4.5 + t * 0.021875) * 0.018;
    const wave2 = Math.sin(p.x * 9.0 + t * 0.040625) * 0.007;
    const surfaceY = 0.68 + wave1 + wave2;
    const py = (surfaceY + p.y * (1.1 - surfaceY)) * H;
    const shiftY = Math.sin(t * 0.015625 + p.phase) * 1.2;
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha.toFixed(2)})`;
    ctx.fillRect(px, py + shiftY, p.size, p.size);
  });
}

// ── MAUSWELLE (EINFACHER ERHÖHTER WELLENGANG) ────────────────────────
const activeWaves = [];
let lastWaveTime = 0;
let lastMouseX = 0;

addEventListener('mousemove', e => {
  if (!running || paused || elapsed < 5) return;
  // Trigger alle 3s bei Mausbewegung
  if ((performance.now() - lastWaveTime) > 3000) {
    createWave(e.clientX);
    lastWaveTime = performance.now();
    lastMouseX = e.clientX;
  }
});

function createWave(x) {
  const wave = {
    centerX: x, 
    vx: 0.3 + Math.random() * 0.09375, 
    born: elapsed,
    particles: []
  };
  
  const particleCount = 400;
  for (let i = 0; i < particleCount; i++) {
    const rx = (Math.random() - 0.5) * 600; 
    // Gaußsche Glockenkurve für die Wellenhöhe - amplitude um 75% erhöht
    const bell = Math.exp(-Math.pow(rx / 220, 2));
    const ryTarget = -bell * (35 + Math.random() * 40) * 1.75;

    wave.particles.push({
      rx: rx,
      ryTarget: ryTarget,
      size: 1.0 + Math.random() * 2.5,
      hue: 180 + Math.random() * 25,
      sat: 70 + Math.random() * 30,
      alpha: 0.3 + Math.random() * 0.6,
      speed: 0.125 + Math.random() * 0.125,
      jitter: Math.random() * Math.PI * 2,
      isFoam: Math.random() > 0.85 && ryTarget < -40
    });
  }
  activeWaves.push(wave);
}

function drawMouseWaves(t) {
  for (let wi = activeWaves.length - 1; wi >= 0; wi--) {
    const w = activeWaves[wi];
    w.centerX += w.vx;
    
    const life = (t - w.born) / 15; // 15 Sekunden Lebensdauer
    if (life > 1) { activeWaves.splice(wi, 1); continue; }

    const globalFade = Math.sin(life * Math.PI);

    w.particles.forEach(p => {
      const px = w.centerX + p.rx;
      
      // Flüssiger Übergang: Nutze die gleiche Oberflächenlogik wie drawWater
      const normX = px / W;
      const wave1 = Math.sin(normX * 4.5 + t * 0.021875) * 0.018;
      const wave2 = Math.sin(normX * 9.0 + t * 0.040625) * 0.007;
      const baseSurfaceY = (0.68 + wave1 + wave2) * H;

      const currentY = p.ryTarget * globalFade;
      const swirlY = Math.sin(t * p.speed + p.jitter) * 3 * globalFade;
      const py = baseSurfaceY + currentY + swirlY + 30; // 30px tiefer statt 200px
      
      const a = p.alpha * globalFade;

      if (a > 0.05) {
        let lit = 45 + (p.ryTarget < -40 ? 15 : 0);
        if (p.isFoam) {
            ctx.fillStyle = `rgba(255, 255, 255, ${a.toFixed(2)})`;
        } else {
            ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${lit}%, ${a.toFixed(2)})`;
        }
        ctx.fillRect(px, py, p.size, p.size);
      }
    });
  }
}






// ── HINTERGRUND ───────────────────────────────────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0.00, '#0d3d3a');
  grad.addColorStop(0.20, '#0a2e2c');
  grad.addColorStop(0.45, '#071f1e');
  grad.addColorStop(0.70, '#041210');
  grad.addColorStop(0.88, '#020808');
  grad.addColorStop(1.00, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────
function loop(ts) {
  if (paused) { requestAnimationFrame(loop); return; }
  elapsed = (ts - sessionStart) / 1000;
  drawBg();
  drawWater(elapsed);
  drawMouseWaves(elapsed); // Hier wieder aktiviert
  updateHUD();
  if (elapsed >= SESSION_DURATION) { endSession(); return; }
  if (running) requestAnimationFrame(loop);
}
window.onerror = () => { if (running) requestAnimationFrame(loop); };

// ── HUD ───────────────────────────────────────────────────────────────
function updateHUD() {
  const secs = Math.floor(elapsed);
  document.getElementById('timerText').textContent =
    String(Math.floor(secs/60)).padStart(2,'0') + ':' + String(secs%60).padStart(2,'0');
  const rem = Math.ceil(RECORD_START + RECORD_DURATION - elapsed);
  if (elapsed < RECORD_START) {
    document.getElementById('status').textContent = 'bewege dich';
  } else if (elapsed < RECORD_START + RECORD_DURATION) {
    document.getElementById('status').innerHTML = `<span class="rec-dot"></span>aufnahme &middot; ${rem}s`;
    if (!recording) startRecording();
  } else {
    document.getElementById('status').textContent = 'fertig — verarbeite...';
    if (recording) stopRecording();
  }
}

function startRecording() { if (recording || !recorder) return; recording = true; chunks = []; recorder.start(100); }
function stopRecording() { if (!recording || !recorder) return; recording = false; recorder.stop(); }

// ── SESSION START (Kopie der funktionierenden Logik aus blue_depth) ────
document.getElementById('startBtn').addEventListener('click', () => {
  const startScreen = document.getElementById('startScreen');
  startScreen.style.opacity = '0'; // Startet den 3s CSS-Fade
  startScreen.style.pointerEvents = 'none'; // Klicks durchlassen waehrend des Fades
  
  // Nach 3 Sekunden wirklich entfernen
  setTimeout(() => { startScreen.style.display = 'none'; }, 3000);

  document.getElementById('sessionUI').style.display   = 'block';
  
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9' : 'video/webm';
  recorder = new MediaRecorder(mainCanvas.captureStream(30), { mimeType });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  
  // Audio wie in blue_depth, aber mit Fade-in
  const snd = new Audio('media/Contrasts-Dryhope.mp3');
  snd.loop = true; 
  snd.volume = 0; // Start bei 0
  soundtrack = snd;

  snd.play().then(() => {
    console.log("Audio gestartet");
    // Manueller Fade-in ueber 3 Sekunden
    let vol = 0;
    const interval = setInterval(() => {
      vol += 0.02;
      if (vol >= 0.75) {
        snd.volume = 0.75;
        clearInterval(interval);
      } else {
        snd.volume = vol;
      }
    }, 80); // ca. 3 Sekunden (3000ms / (0.75 / 0.02) ≈ 80ms)
  }).catch(e => {
    console.error("Audio blockiert:", e);
    // Fallback: Online-Datei falls lokal nicht geht
    snd.src = 'https://cdn.pixabay.com/audio/2022/03/15/audio_7306915065.mp3';
    snd.play();
  });

  document.getElementById('pauseBtn').style.display = 'block';
  running = true;
  sessionStart = performance.now();
  requestAnimationFrame(loop);
});

// ── SESSION END ───────────────────────────────────────────────────────
function endSession() {
  running = false; if (recording) stopRecording();
  setTimeout(() => {
    document.getElementById('sessionUI').style.display = 'none';
    document.getElementById('qrScreen').style.display = 'flex';
    uploadVideo();
  }, 600);
}

async function uploadVideo() {
  const msg = document.getElementById('uploadMsg');
  const mintURL = MINT_BASE_URL + sessionId;
  try {
    msg.textContent = 'lade hoch...';
    const fd = new FormData();
    fd.append('file', new Blob(chunks, { type: 'video/webm' }), `${sessionId}.webm`);
    fd.append('upload_preset', UPLOAD_PRESET);
    fd.append('public_id', sessionId);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    msg.textContent = data.secure_url ? 'upload erfolgreich' : 'upload fehlgeschlagen';
  } catch { msg.textContent = 'upload fehlgeschlagen'; }
  if (!qrGenerated) {
    qrGenerated = true;
    new QRCode(document.getElementById('qrBox'), { text: mintURL, width: 200, height: 200 });
  }
}

// ── PAUSE (Audio stoppt nun wieder) ───────────────────────────────
document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'WEITER' : 'PAUSE';
  if (paused) {
    if (soundtrack) soundtrack.pause();
  } else {
    if (soundtrack) soundtrack.play();
    sessionStart += performance.now() - (sessionStart + elapsed * 1000);
  }
});
document.getElementById('restartBtn').addEventListener('click', () => location.reload());

</script>
</body>
</html>
