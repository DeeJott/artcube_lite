<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>art.cube lite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff;
}
canvas#main { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
video { display: none; }
canvas#motionBuf { display: none; }

#startScreen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10; text-align: center;
}
#startScreen h1 {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 200; letter-spacing: 0.25em;
  margin-bottom: 0.75rem;
}
#startScreen p {
  font-size: 0.9rem; color: rgba(255,255,255,0.45);
  letter-spacing: 0.12em; margin-bottom: 3rem; font-weight: 300;
}
#startBtn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.8);
  padding: 0.75rem 2.5rem;
  font-size: 0.8rem; letter-spacing: 0.2em;
  cursor: pointer; transition: all 0.4s; font-family: inherit;
}
#startBtn:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

#sessionUI {
  position: fixed; top: 1.5rem; left: 0; right: 0;
  text-align: center; z-index: 10; display: none;
  pointer-events: none;
}
#sessionUI #pauseBtn { pointer-events: all; }
#pauseBtn {
  background: transparent; border: 1px solid rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.45); padding: 0.2rem 0.9rem;
  font-size: 0.65rem; letter-spacing: 0.18em;
  cursor: pointer; font-family: inherit; transition: all 0.3s;
  vertical-align: middle; margin-left: 0.8rem; display: none;
}
#pauseBtn:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.85); }
#timer {
  font-size: 0.7rem; letter-spacing: 0.25em;
  color: rgba(255,255,255,0.3); margin-bottom: 0.4rem;
}
#status {
  font-size: 0.8rem; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.5); font-weight: 300;
}
.rec-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: #e84040;
  margin-right: 7px; vertical-align: middle;
  animation: blink 0.9s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#qrScreen {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 20;
}
#qrScreen h2 { font-size: 1rem; font-weight: 300; letter-spacing: 0.2em; margin-bottom: 2rem; color: rgba(255,255,255,0.7); }
#qrBox { background: #fff; padding: 1.25rem; margin-bottom: 1.5rem; }
#qrScreen small { font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-top: 0.5rem; display: block; }
#uploadMsg { font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin-top: 1rem; }
#restartBtn {
  margin-top: 2rem;
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5); padding: 0.6rem 2rem;
  font-size: 0.75rem; letter-spacing: 0.15em;
  cursor: pointer; font-family: inherit; transition: all 0.3s;
}
#restartBtn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<canvas id="main"></canvas>
<video id="webcam" autoplay playsinline muted></video>
<canvas id="motionBuf"></canvas>

<div id="startScreen">
  <h1>art<span style="color:rgba(255,255,255,0.3)">.</span>cube <span style="font-weight:100;opacity:0.6">lite</span></h1>
  <p>bewege dich · forme dein kunstwerk · minte es als nft</p>
  <button id="startBtn">START</button>
</div>

<div id="sessionUI">
  <div id="timer"><span id="timerText">00:00</span> <button id="pauseBtn">PAUSE</button></div>
  <div id="status">bewege dich — forme dein kunstwerk</div>
</div>

<div id="qrScreen">
  <h2>dein kunstwerk ist bereit</h2>
  <div id="qrBox"></div>
  <small>scanne um dein nft zu minten</small>
  <div id="uploadMsg">verbinde mit cloudinary...</div>
  <button id="restartBtn">neue session</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>

const SESSION_DURATION = 40;
const RECORD_START     = 28;
const RECORD_DURATION  = 10;
const CLOUD_NAME       = 'dvsypjad8';
const UPLOAD_PRESET    = 'artbox';
const MINT_BASE_URL    = 'https://art-box-beta.vercel.app/mint?nft=';

const mainCanvas = document.getElementById('main');
const ctx        = mainCanvas.getContext('2d');
const video      = document.getElementById('webcam');
const motionBuf  = document.getElementById('motionBuf');
const mCtx       = motionBuf.getContext('2d', { willReadFrequently: true });

let W, H;
function resize() {
  W = mainCanvas.width  = window.innerWidth;
  H = mainCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let paused       = false;
let running      = false;
let sessionStart = 0;
let elapsed      = 0;
let particles    = [];
let prevData     = null;
let recording    = false;
let recorder     = null;
let chunks       = [];
let sessionId    = 'artcube_' + crypto.randomUUID().replace(/-/g,'').substring(0,12);
let qrGenerated  = false;
const GRID_W = 24, GRID_H = 18;

// ── WATER WAVES (smooth filled layers / sample5 style) ──────────────
const WAVE_LAYERS = [
  { baseY: 0.620, amp: 18, freq: 0.0042, speed: 0.11, r: 120, g: 175, b: 230, a: 0.60 },
  { baseY: 0.648, amp: 22, freq: 0.0058, speed: 0.17, r:  80, g: 130, b: 200, a: 0.75 },
  { baseY: 0.672, amp: 26, freq: 0.0051, speed: 0.23, r:  48, g:  95, b: 168, a: 0.83 },
  { baseY: 0.698, amp: 28, freq: 0.0065, speed: 0.30, r:  28, g:  68, b: 138, a: 0.88 },
  { baseY: 0.722, amp: 30, freq: 0.0048, speed: 0.37, r:  16, g:  48, b: 108, a: 0.92 },
  { baseY: 0.750, amp: 28, freq: 0.0070, speed: 0.44, r:   9, g:  30, b:  78, a: 0.95 },
  { baseY: 0.778, amp: 24, freq: 0.0055, speed: 0.52, r:   5, g:  18, b:  52, a: 0.97 },
  { baseY: 0.808, amp: 20, freq: 0.0062, speed: 0.60, r:   3, g:  10, b:  32, a: 0.98 },
  { baseY: 0.840, amp: 16, freq: 0.0045, speed: 0.68, r:   2, g:   6, b:  18, a: 0.99 },
  { baseY: 0.875, amp: 12, freq: 0.0058, speed: 0.76, r:   1, g:   2, b:   8, a: 1.00 },
];

// Schaumpartikel
const FOAM = Array.from({ length: 180 }, () => ({
  x: Math.random(),      // 0-1 relativ zu W
  ox: Math.random() * Math.PI * 2,  // phase offset
  r: 0.8 + Math.random() * 3.5,
  a: 0.15 + Math.random() * 0.70,
  speed: 0.6 + Math.random() * 0.8,
  layer: Math.floor(Math.random() * 4),
}));

function waveY(x, layer, t) {
  const p = x * layer.freq - t * layer.speed;
  return layer.baseY * H
    + Math.sin(p)            * layer.amp
    + Math.sin(p * 2 + 0.8) * layer.amp * 0.42
    + Math.sin(p * 3 + 1.5) * layer.amp * 0.18;
}

function drawWater(t) {
  const step = 4;

  // Schichten von hinten (dunkel/tief) nach vorne (hell/oben)
  for (let li = WAVE_LAYERS.length - 1; li >= 0; li--) {
    const layer = WAVE_LAYERS[li];
    const { r, g, b, a } = layer;
    const topY = waveY(W / 2, layer, t);

    // Vertikaler Gradient pro Schicht: Kamm heller, Tiefe dunkler
    const grad = ctx.createLinearGradient(0, topY, 0, H);
    grad.addColorStop(0,   `rgba(${r},${g},${b},${a})`);
    grad.addColorStop(0.3, `rgba(${Math.round(r*0.6)},${Math.round(g*0.5)},${Math.round(b*0.7)},${a})`);
    grad.addColorStop(1,   `rgba(0,0,0,${a})`);

    ctx.beginPath();
    ctx.moveTo(0, waveY(0, layer, t));
    for (let x = step; x <= W; x += step)
      ctx.lineTo(x, waveY(x, layer, t));
    ctx.lineTo(W, H + 2);
    ctx.lineTo(0, H + 2);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Duenne helle Trennlinie an den oberen 4 Schichten
  for (let li = 0; li < 5; li++) {
    const layer = WAVE_LAYERS[li];
    const brightness = 1 - li / 5;
    ctx.beginPath();
    ctx.moveTo(0, waveY(0, layer, t));
    for (let x = step; x <= W; x += step)
      ctx.lineTo(x, waveY(x, layer, t));
    ctx.strokeStyle = `rgba(${Math.round(120 + brightness * 100)},${Math.round(170 + brightness * 70)},255,${(0.25 + brightness * 0.30).toFixed(2)})`;
    ctx.lineWidth = 0.8 + brightness * 0.6;
    ctx.lineJoin = 'round'; ctx.stroke();
  }

  // Schaum an der obersten Schicht
  const topLayer = WAVE_LAYERS[0];
  FOAM.forEach(f => {
    const wx  = f.x * W;
    const wl  = WAVE_LAYERS[Math.min(f.layer, WAVE_LAYERS.length - 1)];
    const wy  = waveY(wx, wl, t) - 1 + Math.sin(t * f.speed + f.ox) * 2;
    if (wy > H) return;
    ctx.beginPath();
    ctx.arc(wx, wy, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,225,255,${f.a.toFixed(2)})`;
    ctx.fill();
  });
}

// ── BACKGROUND ───────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fillRect(0, 0, W, H);
}

// ── MOTION DETECTION ─────────────────────────────────────────────────
let motionInitialized = false;
function detectMotion() {
  if (!video.videoWidth || !video.videoHeight) return;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!motionInitialized) {
    motionBuf.width = vw; motionBuf.height = vh;
    motionInitialized = true;
  }
  mCtx.drawImage(video, 0, 0, vw, vh);
  const cur = mCtx.getImageData(0, 0, vw, vh);
  if (!prevData) { prevData = cur; return; }
  prevData = cur;
}

// ── MAIN LOOP ────────────────────────────────────────────────────────
function loop(ts) {
  if (paused) { requestAnimationFrame(loop); return; }
  elapsed = (ts - sessionStart) / 1000;
  drawBg();
  drawWater(elapsed);
  try { detectMotion(); } catch(e) {}

  updateHUD();

  const pb = document.getElementById('pauseBtn');
  pb.style.display = elapsed < RECORD_START ? 'block' : 'none';

  if (elapsed >= SESSION_DURATION) { endSession(); return; }
  if (running) requestAnimationFrame(loop);
}
window.onerror = () => { if (running) requestAnimationFrame(loop); };

// ── HUD ───────────────────────────────────────────────────────────────
function updateHUD() {
  const secs = Math.floor(elapsed);
  const mm = String(Math.floor(secs / 60)).padStart(2,'0');
  const ss = String(secs % 60).padStart(2,'0');
  document.getElementById('timerText').textContent = `${mm}:${ss}`;

  const inRec = elapsed >= RECORD_START && elapsed < RECORD_START + RECORD_DURATION;
  const remaining = Math.ceil(RECORD_START + RECORD_DURATION - elapsed);

  if (elapsed < RECORD_START) {
    document.getElementById('status').textContent = 'bewege dich — forme dein kunstwerk';
  } else if (inRec) {
    document.getElementById('status').innerHTML = `<span class="rec-dot"></span>aufnahme · ${remaining}s`;
    if (!recording) startRecording();
  } else {
    document.getElementById('status').textContent = 'fertig — verarbeite...';
    if (recording) stopRecording();
  }
}

// ── RECORDING ────────────────────────────────────────────────────────
function startRecording() {
  if (recording || !recorder) return;
  recording = true; chunks = [];
  recorder.start(100);
}
function stopRecording() {
  if (!recording || !recorder) return;
  recording = false;
  recorder.stop();
}

// ── SESSION START ────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = camStream;
    await video.play();

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('sessionUI').style.display = 'block';

    const canvasStream = mainCanvas.captureStream(30);
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    recorder = new MediaRecorder(canvasStream, { mimeType });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    document.getElementById('pauseBtn').style.display = 'block';
    running = true;
    sessionStart = performance.now();
    requestAnimationFrame(loop);

  } catch (err) {
    document.getElementById('startScreen').querySelector('p').textContent =
      'kamera-zugriff verweigert — bitte erlauben und neu laden';
  }
});

// ── SESSION END ───────────────────────────────────────────────────────
function endSession() {
  running = false;
  if (recording) stopRecording();
  setTimeout(() => {
    document.getElementById('sessionUI').style.display = 'none';
    document.getElementById('qrScreen').style.display = 'flex';
    uploadVideo();
  }, 800);
}

// ── UPLOAD + QR ──────────────────────────────────────────────────────
async function uploadVideo() {
  const msg = document.getElementById('uploadMsg');
  const mintURL = MINT_BASE_URL + sessionId;
  try {
    msg.textContent = 'lade hoch zu cloudinary...';
    const blob = new Blob(chunks, { type: 'video/webm' });
    const formData = new FormData();
    formData.append('file', blob, `${sessionId}.webm`);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('public_id', sessionId);
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: 'POST', body: formData });
    const data = await res.json();
    msg.textContent = data.secure_url ? 'upload erfolgreich · bereit zum minten' : 'upload fehlgeschlagen';
  } catch (e) {
    msg.textContent = 'upload fehlgeschlagen · qr trotzdem verfügbar';
  }
  if (!qrGenerated) {
    qrGenerated = true;
    new QRCode(document.getElementById('qrBox'), {
      text: mintURL, width: 200, height: 200,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

// ── PAUSE ────────────────────────────────────────────────────────────
document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'WEITER' : 'PAUSE';
  if (!paused) sessionStart += performance.now() - (sessionStart + elapsed * 1000);
});

// ── RESTART ──────────────────────────────────────────────────────────
document.getElementById('restartBtn').addEventListener('click', () => location.reload());

</script>
</body>
</html>
